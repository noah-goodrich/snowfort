services:
  snowfort-audit-app:
    labels:
      - dev.role=app
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      # --- project files ---
      - ..:/development:cached

      # ---------------------------------------------------------------
      # STANDARD DOTFILES BLOCK — copy this verbatim to new projects.
      # Brings your shell, editor, and git config into the container
      # so the environment feels identical to your host.
      # ---------------------------------------------------------------
      - ~/.zshrc:/home/dev/.zshrc:cached                          # zsh config
      - ~/.p10k.zsh:/home/dev/.p10k.zsh:cached                    # p10k prompt config
      - ~/.config/zsh:/home/dev/.config/zsh:cached                # zsh plugins (p10k, autosuggestions, syntax-highlight)
      - ~/.config/nvim:/home/dev/.config/nvim:cached              # neovim config
      # Selective ~/.ssh mounts — see dotfiles/devcontainer/docker-compose.base.yml
      # for why we don't bind-mount ~/.ssh or ~/.ssh/agent as directories.
      - ~/.ssh/config:/home/dev/.ssh/config:ro                     # SSH client config
      - ~/.ssh/known_hosts:/home/dev/.ssh/known_hosts:ro           # host fingerprints
      - ~/.gitconfig:/home/dev/.gitconfig:cached                  # git identity & config
      - /run/host-services/ssh-auth.sock:/run/host-services/ssh-auth.sock  # SSH agent forwarding (Docker Desktop)
      - ~/.claude:/home/dev/.claude:cached                             # Claude Code hooks & memory
      - ~/.config/borg:/home/dev/.config/borg:cached                  # Borg registry (for hooks)
      - ~/.config/dotfiles/claude/plugins:/home/dev/.config/dotfiles/claude/plugins:cached  # Plugin marketplace source
      # host home read-only — postStartCommand copies .claude.json fresh each start
      # (avoids stale inode from Claude Code's atomic file replacement)
      - ~/:/host-home:ro
      # ---------------------------------------------------------------

    env_file:
      - .secrets.env
    environment:
      SSH_AUTH_SOCK: /run/host-services/ssh-auth.sock
    command: sleep infinity
    networks:
      - devnet

networks:
  devnet:
    external: true

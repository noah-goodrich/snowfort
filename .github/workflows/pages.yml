name: Deploy GitHub Pages

# Runs the moment Noah flips "Enable Pages, source: GitHub Actions" in repo
# Settings > Pages. Until then this workflow exists but does not deploy
# (the deploy-pages action requires Pages to be enabled in the UI).
#
# Source content lives in docs/site/. Plain HTML + CSS, no build step.

on:
  push:
    branches: [main]
    paths:
      - "docs/site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload the docs/site directory as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

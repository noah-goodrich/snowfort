name: Smoke test (pipx install)

on:
  push:
    branches: [main]
    paths:
      - "packages/snowfort-audit/**"
      - ".github/workflows/smoke-test.yml"
  pull_request:
    paths:
      - "packages/snowfort-audit/**"
      - ".github/workflows/smoke-test.yml"
  workflow_dispatch: {}

jobs:
  pipx-install:
    name: pipx install on ${{ matrix.os }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install pipx
        run: |
          python -m pip install --upgrade pip
          python -m pip install pipx
          python -m pipx ensurepath

      - name: Build the package
        working-directory: packages/snowfort-audit
        run: |
          python -m pip install build
          python -m build --wheel --outdir dist

      - name: Install via pipx from the built wheel
        run: |
          python -m pipx install packages/snowfort-audit/dist/*.whl

      - name: Verify the CLI is callable
        run: |
          snowfort --version
          snowfort audit --help

      - name: Run an offline scan against the showcase
        working-directory: packages/snowfort-audit
        run: |
          snowfort audit scan --offline --path examples/offline_showcase

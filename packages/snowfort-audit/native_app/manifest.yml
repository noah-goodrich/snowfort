manifest_version: 1

artifacts:
  setup_script: setup.sql
  default_streamlit: snowfort_audit_app
  extension_code: true

configuration:
  log_level: INFO
  trace_level: OFF

privileges:
  - IMPORTED PRIVILEGES ON SNOWFLAKE DB:
      description: "Read ACCOUNT_USAGE views for WAF auditing"
  - EXECUTE TASK:
      description: "Schedule periodic audit scans"

references:
  - snowflake_warehouse:
      label: "Audit Warehouse"
      description: "Warehouse used for running audit queries"
      privileges:
        - USAGE
      object_type: WAREHOUSE
      register_callback: config_reference_callback
